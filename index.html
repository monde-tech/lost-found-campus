<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Lost & Found</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0f14;
  --surface:#161920;
  --surface2:#1e2229;
  --border:rgba(255,255,255,0.07);
  --text:#f0f2f7;
  --muted:#7a8499;
  --lost:#ff4d6d;
  --lost-bg:rgba(255,77,109,0.12);
  --found:#22c55e;
  --found-bg:rgba(34,197,94,0.12);
  --claimed:#3b82f6;
  --claimed-bg:rgba(59,130,246,0.12);
  --accent:#f5c518;
  --accent2:#e879f9;
  --radius:14px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(245,197,24,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(232,121,249,0.05) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

nav{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(13,15,20,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:64px;
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-logo .icon{
  width:36px;
  height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.nav-logo span{
  font-family:'Playfair Display',serif;
  font-weight:700;
  font-size:18px;
}

.nav-logo span em{
  font-style:normal;
  color:var(--accent);
}

.nav-tabs{
  display:flex;
  gap:4px;
  background:var(--surface2);
  border-radius:50px;
  padding:4px;
}

.nav-tab{
  padding:7px 18px;
  border-radius:50px;
  border:none;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  font-size:14px;
  font-weight:500;
}

.nav-tab.active{
  background:linear-gradient(135deg,var(--accent),#f0a500);
  color:#000;
  font-weight:700;
}

.hamburger{
  display:none;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
  background:none;
  border:none;
}

.hamburger span{
  width:22px;
  height:2px;
  background:white;
}

.mobile-menu{
  display:none;
  position:fixed;
  top:64px;
  left:0;
  right:0;
  background:var(--surface);
  padding:16px;
  flex-direction:column;
  gap:8px;
  z-index:99;
}

.mobile-menu.open{
  display:flex;
}

.page{
  display:none;
  padding:32px 24px;
  max-width:1100px;
  margin:auto;
}

.page.active{
  display:block;
}

.hero{
  text-align:center;
  padding:60px 0 40px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,5vw,3.8rem);
  font-weight:900;
  line-height:1.1;
  margin-bottom:16px;
}

.hero h1 .gd{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:var(--muted);
  max-width:520px;
  margin:0 auto 40px;
  line-height:1.7;
}

.hero-stats{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:48px;
}

.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 28px;
  min-width:130px;
  text-align:center;
}

.stat-card .num{
  font-size:2rem;
  font-weight:900;
}

.s-lost .num{ color:var(--lost); }
.s-found .num{ color:var(--found); }
.s-claimed .num{ color:var(--claimed); }

.search-bar-wrap{
  display:flex;
  gap:10px;
  max-width:560px;
  margin:0 auto 48px;
}

.search-bar-wrap input{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50px;
  padding:14px 22px;
  color:white;
}

.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.6rem;
  text-align:center;
  margin-bottom:24px;
}

.flow-steps{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.flow-step{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.step-num{
  width:34px;
  height:34px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#f0a500);
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.quick-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  max-width:560px;
  margin:auto;
}

.action-card{
  border:none;
  border-radius:var(--radius);
  padding:28px 24px;
  cursor:pointer;
  text-align:left;
  color:white;
}

.lost-card{
  background:linear-gradient(135deg,rgba(255,77,109,0.2),rgba(255,77,109,0.06));
}

.found-card{
  background:linear-gradient(135deg,rgba(34,197,94,0.2),rgba(34,197,94,0.06));
}

.form-tabs{
  display:flex;
  background:var(--surface2);
  border-radius:12px;
  padding:4px;
  max-width:400px;
  margin:0 auto 32px;
}

.form-tab-btn{
  flex:1;
  padding:11px;
  border:none;
  background:transparent;
  color:var(--muted);
  border-radius:9px;
  cursor:pointer;
}

.form-tab-btn.active{
  font-weight:700;
}

.lost-tab.active{
  background:var(--lost-bg);
  color:var(--lost);
}

.found-tab.active{
  background:var(--found-bg);
  color:var(--found);
}

.form-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:32px;
  max-width:640px;
  margin:auto;
}

.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  color:var(--muted);
}

.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  color:white;
}

.form-group textarea{
  resize:vertical;
  min-height:100px;
}

.photo-drop{
  border:2px dashed var(--border);
  border-radius:12px;
  padding:32px;
  text-align:center;
  cursor:pointer;
}

.photo-drop input{
  display:none;
}

.photo-preview{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:12px;
  display:none;
}

.btn-primary{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#f0a500);
  font-weight:700;
  cursor:pointer;
}

.browse-controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:24px;
}

.browse-search{
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50px;
  padding:11px 20px;
  color:white;
}

.filter-chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  padding:7px 14px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  cursor:pointer;
}

.chip.active{
  background:var(--accent);
  color:black;
  border-color:var(--accent);
}

.items-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}

.item-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
}

.item-img{
  width:100%;
  height:160px;
  background:var(--surface2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
}

.item-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.item-body{
  padding:16px;
}

.item-header{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

.badge{
  padding:3px 10px;
  border-radius:50px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
}

.badge-lost{
  background:var(--lost-bg);
  color:var(--lost);
}

.badge-found{
  background:var(--found-bg);
  color:var(--found);
}

.badge-claimed{
  background:var(--claimed-bg);
  color:var(--claimed);
}

.empty-state{
  text-align:center;
  padding:80px 20px;
  color:var(--muted);
}

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:200;
}

.modal-overlay.open{
  display:flex;
}

.modal{
  background:var(--surface);
  border-radius:20px;
  max-width:520px;
  width:100%;
  overflow:hidden;
}

.modal-img{
  width:100%;
  height:220px;
  background:var(--surface2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:5rem;
}

.modal-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.modal-body{
  padding:28px;
}

.modal-title{
  font-size:1.5rem;
  margin-bottom:16px;
}

.modal-detail{
  margin-bottom:10px;
}

.modal-desc{
  background:var(--surface2);
  padding:14px;
  border-radius:10px;
  margin:16px 0;
}

.modal-actions{
  display:flex;
  gap:10px;
}

.btn-contact,
.btn-close-modal{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-contact{
  background:linear-gradient(135deg,var(--accent),#f0a500);
}

.btn-close-modal{
  background:var(--surface2);
  color:white;
}

.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  padding:12px 24px;
  border-radius:50px;
  transition:0.3s;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
}

@media(max-width:768px){
  .nav-tabs{
    display:none;
  }

  .hamburger{
    display:flex;
  }

  .form-row{
    grid-template-columns:1fr;
  }

  .quick-actions{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">
    <div class="icon">🎓</div>
    <span>Campus <em>Lost & Found</em></span>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">🏠 Home</button>
    <button class="nav-tab" onclick="showPage('report')">📋 Report</button>
    <button class="nav-tab" onclick="showPage('browse')">🔍 Browse</button>
  </div>

  <button class="hamburger" onclick="toggleMobile()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="nav-tab active" onclick="showPage('home');closeMobile()">🏠 Home</button>
  <button class="nav-tab" onclick="showPage('report');closeMobile()">📋 Report</button>
  <button class="nav-tab" onclick="showPage('browse');closeMobile()">🔍 Browse</button>
</div>

<!-- HOME -->
<div class="page active" id="page-home">

  <div class="hero">
    <h1>Campus<br><span class="gd">Lost & Found</span></h1>

    <p>
      A clean, fast portal to report lost items and reunite found ones with their owners.
    </p>

    <div class="search-bar-wrap">
      <input type="text" id="heroSearch"
      placeholder="Search for a lost item…"
      onkeydown="if(event.key==='Enter')heroSearchGo(this.value,true)">
    </div>

    <div class="hero-stats">
      <div class="stat-card">
        <div class="num" id="statTotal">0</div>
        <div>Total</div>
      </div>

      <div class="stat-card s-lost">
        <div class="num" id="statLost">0</div>
        <div>Lost</div>
      </div>

      <div class="stat-card s-found">
        <div class="num" id="statFound">0</div>
        <div>Found</div>
      </div>

      <div class="stat-card s-claimed">
        <div class="num" id="statClaimed">0</div>
        <div>Claimed</div>
      </div>
    </div>
  </div>

</div>

<!-- REPORT -->
<div class="page" id="page-report">

  <div style="text-align:center;margin-bottom:32px;">
    <h2 style="font-size:2rem;">Report an Item</h2>
  </div>

  <div class="form-tabs">
    <button class="form-tab-btn lost-tab active"
      id="tabLost"
      onclick="setFormTab('lost')">
      🔴 Lost
    </button>

    <button class="form-tab-btn found-tab"
      id="tabFound"
      onclick="setFormTab('found')">
      🟢 Found
    </button>
  </div>

  <div class="form-card">

    <div class="form-row">

      <div class="form-group">
        <label>Item Name</label>
        <input type="text" id="f-name">
      </div>

      <div class="form-group">
        <label>Category</label>

        <select id="f-category">
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Accessories</option>
          <option>Documents</option>
          <option>Keys</option>
          <option>Jewelry</option>
          <option>Books</option>
          <option>Other</option>
        </select>
      </div>

    </div>

    <div class="form-row">

      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" id="f-location">
      </div>

    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc"></textarea>
    </div>

    <div class="form-group">
      <label>Contact</label>
      <input type="text" id="f-contact">
    </div>

    <div class="form-group">
      <label>Photo</label>

      <div class="photo-drop"
      onclick="document.getElementById('f-photo').click()">

        <div>📷 Upload Photo</div>

        <input type="file"
        id="f-photo"
        accept="image/*"
        onchange="previewPhoto(this)">

        <img id="photoPreview" class="photo-preview">

      </div>
    </div>

    <button class="btn-primary" onclick="submitReport()">
      Submit Report
    </button>

  </div>
</div>

<!-- BROWSE -->
<div class="page" id="page-browse">

  <h2 style="margin-bottom:20px;">Browse Items</h2>

  <div class="browse-controls">

    <input class="browse-search"
    type="text"
    id="browseSearch"
    placeholder="Search items..."
    oninput="renderBrowse()">

  </div>

  <div class="items-grid" id="browseGrid"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">

  <div class="modal" id="modalBox">

    <div class="modal-img" id="modalImg"></div>

    <div class="modal-body">

      <div class="modal-title" id="modalTitle"></div>

      <div id="modalMeta"></div>

      <div class="modal-desc" id="modalDesc"></div>

      <div class="modal-actions">

        <button class="btn-contact"
        id="modalContactBtn">
          Contact
        </button>

        <button class="btn-close-modal"
        onclick="closeModal()">
          Close
        </button>

      </div>

    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='clf_items_v2';

let items=[];
let activeFormTab='lost';

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(items));
}

function load(){
  items=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
}

function showPage(p){

  document.querySelectorAll('.page')
  .forEach(el=>el.classList.remove('active'));

  document.getElementById('page-'+p)
  .classList.add('active');

  document.querySelectorAll('.nav-tab')
  .forEach(el=>el.classList.remove('active'));

  const map={
    home:'🏠',
    report:'📋',
    browse:'🔍'
  };

  document.querySelectorAll('.nav-tab').forEach(el=>{
    if(el.textContent.includes(map[p])){
      el.classList.add('active');
    }
  });

  if(p==='browse'){
    renderBrowse();
  }

  window.scrollTo(0,0);
}

function toggleMobile(){
  document.getElementById('mobileMenu')
  .classList.toggle('open');
}

function closeMobile(){
  document.getElementById('mobileMenu')
  .classList.remove('open');
}

function setFormTab(t){

  activeFormTab=t;

  document.getElementById('tabLost')
  .classList.toggle('active',t==='lost');

  document.getElementById('tabFound')
  .classList.toggle('active',t==='found');
}

function previewPhoto(input){

  const preview=document.getElementById('photoPreview');

  if(input.files && input.files[0]){

    const reader=new FileReader();

    reader.onload=e=>{
      preview.src=e.target.result;
      preview.style.display='block';
    };

    reader.readAsDataURL(input.files[0]);
  }
}

function submitReport(){

  const photoPreview=document.getElementById('photoPreview');

  items.unshift({
    id:Date.now().toString(),
    status:activeFormTab,
    name:document.getElementById('f-name').value,
    category:document.getElementById('f-category').value,
    date:document.getElementById('f-date').value,
    location:document.getElementById('f-location').value,
    description:document.getElementById('f-desc').value,
    contact:document.getElementById('f-contact').value,
    photo:photoPreview.src || ''
  });

  save();

  renderBrowse();

  updateStats();

  showToast('Report submitted!');

  showPage('browse');
}

function updateStats(){

  document.getElementById('statTotal').textContent=items.length;

  document.getElementById('statLost').textContent=
    items.filter(i=>i.status==='lost').length;

  document.getElementById('statFound').textContent=
    items.filter(i=>i.status==='found').length;

  document.getElementById('statClaimed').textContent=
    items.filter(i=>i.status==='claimed').length;
}

function renderBrowse(){

  const query=document.getElementById('browseSearch')
  .value.toLowerCase();

  const filtered=items.filter(item=>
    item.name.toLowerCase().includes(query)
  );

  const grid=document.getElementById('browseGrid');

  if(!filtered.length){

    grid.innerHTML=`
      <div class="empty-state">
        No items found.
      </div>
    `;

    return;
  }

  grid.innerHTML=filtered.map(item=>`

    <div class="item-card"
    onclick="openModal('${item.id}')">

      <div class="item-img">
        ${item.photo
          ? `<img src="${item.photo}">`
          : '📦'}
      </div>

      <div class="item-body">

        <div class="item-header">

          <div>${item.name}</div>

          <div class="badge badge-${item.status}">
            ${item.status}
          </div>

        </div>

        <div>${item.location}</div>

      </div>

    </div>

  `).join('');
}

function openModal(id){

  const item=items.find(i=>i.id===id);

  if(!item) return;

  document.getElementById('modalTitle')
  .textContent=item.name;

  document.getElementById('modalMeta')
  .innerHTML=`
    <div class="modal-detail">📍 ${item.location}</div>
    <div class="modal-detail">📅 ${item.date}</div>
  `;

  document.getElementById('modalDesc')
  .textContent=item.description;

  document.getElementById('modalImg').innerHTML=
    item.photo
    ? `<img src="${item.photo}">`
    : '📦';

  document.getElementById('modalOverlay')
  .classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay')
  .classList.remove('open');
}

function heroSearchGo(val,go){

  if(go){

    document.getElementById('browseSearch').value=val;

    showPage('browse');

    renderBrowse();
  }
}

function showToast(msg){

  const t=document.getElementById('toast');

  t.textContent=msg;

  t.classList.add('show');

  setTimeout(()=>{
    t.classList.remove('show');
  },3000);
}

document.addEventListener('DOMContentLoaded',()=>{

  document.getElementById('f-date').valueAsDate=
    new Date();

  load();

  updateStats();

  renderBrowse();
});
</script>

</body>
</html>
